project:
    type: website
    output-dir: _site
    render:
        - "*.qmd"
        - "days/*.qmd"
        - "!README.md"

website:
    title: "50-Day LLM Bootcamp"
    site-url: "https://chenyangsu.github.io/llm-50-day-bootcamp"
    description: "A 50-day, day-by-day plan to go from backpropagation to building, fine-tuning and honestly evaluating a language model."
    open-graph: true
    search:
        location: navbar
        type: overlay
    navbar:
        title: "50-Day LLM Bootcamp"
        left:
            - text: "The 50 days"
              href: timeline.qmd
            - text: "Milestones"
              href: milestones.qmd
            - text: "Resources"
              href: resources.qmd
            - text: "Setup"
              href: setup.qmd
            - text: "Self-check"
              href: assessment.qmd
        right:
            - icon: github
              href: https://github.com/chenyangsu/llm-50-day-bootcamp
              aria-label: GitHub repository
    page-footer:
        left: "24 July – 11 September 2026"
        right: "Progress is stored in this browser only."

format:
    html:
        theme:
            light: cosmo
            dark: darkly
        toc: true
        toc-depth: 2
        anchor-sections: true
        link-external-newwindow: true
        css:
            - styles.css
        include-after-body:
            - _includes/site-js.html
