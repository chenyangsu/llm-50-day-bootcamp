  kind: study
  title: 'Attention from the textbook: Q, K, V and the sqrt(d_k)'
  hours: 3-4 h
  why: Attention is a weighted average where the weights are computed from the data itself. Heads, masks,
    positional embeddings, residuals and layer norm all exist to make that one operation trainable and
    stackable. Get the whole thing from a chapter that shows the equations and the shapes, before tomorrow's
    paper compresses it into half a page.
  objectives:
  - You can explain the sqrt(d_k) divisor from the variance of a dot product, and say what breaks at d_k
    = 64 without it.
  - You can write causal masking in three lines and say why the mask is applied to the scores before the
    softmax rather than to the weights after it.
  - You can count the parameters in one transformer block at d_model = 384 with 6 heads, and say what
    fraction sits in the feed-forward sublayer rather than in attention.
  tasks:
  - text: 'Read SLP3 Ch8 through single-head attention. When you reach the scaling factor, stop and do
      the algebra yourself: for two independent d_k-vectors with unit-variance entries, the dot product
      has variance d_k, so dividing by sqrt(d_k) puts the scores back at unit variance. Then write what
      a variance of 64 does to a softmax.'
    minutes: 70
  - text: Read multi-head attention and causal masking. Work out on paper why the mask is a lower-triangular
      fill with negative infinity and not a multiply by zero, and what each row of the attention matrix
      has to sum to.
    minutes: 50
  - text: 'Read the input and output ends: token embeddings plus positional embeddings, the residual stream,
      where layer norm sits, the feed-forward sublayer with its 4x expansion, the unembedding matrix and
      weight tying.'
    minutes: 45
  - text: Write one attention head as five matrix operations with a shape on every intermediate, for batch
      32, context 256, d_model 384, 6 heads. Then write out the causal mask explicitly for T = 4 and sanity-check
      that row 2 attends to exactly three positions.
    minutes: 35
  resources:
  - label: SLP3 Ch8 - Transformers
    url: https://web.stanford.edu/~jurafsky/slp3/8.pdf
    kind: textbook
