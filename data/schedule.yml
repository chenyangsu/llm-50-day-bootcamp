  kind: milestone
  title: Milestone 4 - RAG over your abstract corpus, measured in two halves
  hours: 3-4 h
  why: Building the retriever takes an hour; the reason this is a milestone is that you will measure retrieval
    and generation separately, which is the step most published RAG evaluations skip and the reason many
    of their numbers do not mean what they appear to.
  objectives:
  - You can report recall@1, recall@5 and MRR for your retriever with no reference to any generated answer.
  - You can report a gold-context ceiling and a no-context floor on the same questions, and say what fraction
    of the gap between them your retriever actually closes.
  - You can split your end-to-end errors into retrieval failures and generation failures with counts,
    and defend the assignment of any single case.
  tasks:
  - text: Chunk and embed the corpus. Decide explicitly between whole-abstract chunks and sentence windows
      and write down why - for 250-word abstracts this is a real choice, not a default. Embed with your
      bi-encoder, L2-normalize, and build a FAISS IndexFlatIP so that inner product is cosine and the
      search is exact; save the ID mapping alongside the index.
    minutes: 55
  - text: 'Build a 30-query evaluation set with known relevant abstract IDs. Check for the leak that ruins
      this kind of eval: if a query was written by paraphrasing one abstract, that abstract is trivially
      retrievable and your recall is inflated. Mark any such query and keep them in a separate bucket.'
    minutes: 35
  - text: Evaluate the retriever alone. Compute recall@1, recall@5, recall@20 and MRR for the dense index
      and for yesterday's BM25 baseline over the same 30 queries. Report both, and note where they disagree
      - the queries where BM25 wins usually contain an exact gene or drug symbol.
    minutes: 45
  - text: Wire retrieval into the generator and evaluate end to end using the Milestone 2 metrics from
      Day 35. Report the retrieval table and the end-to-end table as two separate tables with no combined
      score anywhere in the document.
    minutes: 50
  - text: 'Run the two ablations that make the end-to-end number interpretable: feed the correct abstract
      directly with no retriever (the ceiling), and feed no context at all (the floor). Record both.'
    minutes: 25
  resources:
