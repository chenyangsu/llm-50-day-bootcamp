# 50-Day LLM Bootcamp -- single source of truth.
# Edit here, then run: python3 scripts/build.py

meta:
  title: 50-Day LLM Bootcamp
  start_date: '2026-07-24'
  end_date: '2026-09-11'
  timezone: America/Winnipeg
  site_url: https://chenyangsu.github.io/llm-50-day-bootcamp
  daily_hours: 3-4 h
  prep_for_day_1:
  - 'Install uv and create a Python 3.12 environment, then install PyTorch — the Setup page has the exact
    commands: https://chenyangsu.github.io/llm-50-day-bootcamp/setup.html'
  - Run `nvidia-smi` to find out whether WSL can see a GPU. If it can't, that is fine for weeks 1-4; open
    Colab and confirm you can start a runtime.
  - Clone the five repos listed on the Setup page (nn-zero-to-hero, micrograd, makemore, minbpe, nanoGPT).
  - Create Hugging Face and Weights & Biases accounts if you don't have them, and run the verification
    snippet at the bottom of the Setup page.
days:
- day: 1
  date: '2026-07-24'
  weekday: Friday
  week: 1
  phase: Foundations
  kind: study
  title: Tensors, gradients, and the chain rule
  hours: 3-4 h
  why: Everything in the next 49 days is matrix multiplies and elementwise functions glued together by
    the chain rule, so today fixes the notation and the tensor mechanics before anything else depends
    on them.
  objectives:
  - Derive the gradient of ||y - Xb||^2 with respect to b and land on -2X'(y - Xb) using only the identities
    from D2L 2.4, not memory.
  - Predict the output shape of A.sum(axis=0), A.sum(axis=1), and A.sum(axis=1, keepdims=True) for A of
    shape (5, 4) before running any of them.
  - Write a central-difference gradient checker and state what value of eps makes it worse rather than
    better.
  tasks:
  - text: Read D2L 2.3 Linear Algebra in a notebook, typing every code cell instead of reading past it.
      Stop at every `axis=` argument and say the output shape out loud before you run the cell, especially
      where `keepdims=True` appears.
    minutes: 65
  - text: 'Read D2L 2.4 Calculus, including the gradient identities near the end: grad of Ax, of x''A,
      of x''Ax, and of ||x||^2. Copy those four into your notes by hand. You will use them constantly
      and you will not want to re-derive them each time.'
    minutes: 55
  - text: Derive d/db of ||y - Xb||^2 on paper using only those identities, and confirm you get -2X'(y
      - Xb). You already know the closed-form OLS solution; the point is that today it falls out of the
      chain rule rather than out of a textbook box.
    minutes: 40
  - text: 'Implement `numerical_gradient(f, x, eps=1e-5)` using the central difference (f(x+eps) - f(x-eps))
      / (2*eps) and check it against your analytic OLS gradient on a random X of shape (100, 5). Print
      the max absolute difference: it should sit at 1e-7 or below. Then rerun with eps=1e-12 and watch
      it get worse.'
    minutes: 45
  resources:
  - label: D2L 2.3 - Linear Algebra
    url: https://d2l.ai/chapter_preliminaries/linear-algebra.html
    kind: textbook
  - label: D2L 2.4 - Calculus
    url: https://d2l.ai/chapter_preliminaries/calculus.html
    kind: textbook
  - label: D2L landing page
    url: https://d2l.ai/
    kind: textbook
  deliverable: '`day01_linalg_calculus.ipynb` containing the 2.3 and 2.4 cells you typed yourself, your
    hand-derived OLS gradient (photo or a LaTeX cell), and the numerical-vs-analytic check with the max
    absolute difference printed for eps=1e-5 and eps=1e-12.'
  checkpoint: 'For A of shape (5, 4): why does `A / A.sum(axis=1)` either fail or silently give you the
    wrong thing, while `A / A.sum(axis=1, keepdims=True)` does what you meant?'
  prep_for_tomorrow:
  - Run `import torch; print(torch.__version__)` and confirm you have a 2.x build. Install it tonight
    if not, because tomorrow is entirely PyTorch.
  - Open D2L 2.5 Automatic Differentiation and read only the section headings. Five minutes, no code.
  - Bookmark the PyTorch autograd mechanics note; it is the second half of tomorrow's reading.
- day: 2
  date: '2026-07-25'
  weekday: Saturday
  week: 1
  phase: Foundations
  kind: study
  title: What backward() actually does
  hours: 3-4 h
  why: Yesterday you differentiated by hand; today you find out what PyTorch records during the forward
    pass in order to do it for you, and what its failure modes look like when you get it wrong.
  objectives:
  - Say what is in `x.grad` after two consecutive `backward()` calls with no `zero_()` between them, and
    why PyTorch chose accumulation over overwriting.
  - Explain what `detach()` cuts out of the recorded graph and name one situation where you want exactly
    that.
  - Explain why a function containing a `while` loop and an `if` branch still differentiates correctly.
  tasks:
  - text: Read D2L 2.5 Automatic Differentiation end to end, typing the cells. Slow down on `requires_grad_(True)`,
      on `x.grad.zero_()`, and on the subsection about calling `backward()` on a non-scalar.
    minutes: 55
  - text: Read the PyTorch autograd mechanics note, specifically how autograd encodes the history and
      how to locally disable gradient computation (`no_grad`, `inference_mode`, `detach`). This is the
      reference page you will come back to in Week 4 when something silently stops training.
    minutes: 45
  - text: 'Run the control-flow example from 2.5: `f(a)` with a `while b.norm() < 1000` loop and an `if
      b.sum() > 0` branch. Call `backward()` and confirm `a.grad == d / a`. Then write two sentences explaining
      why that identity holds - for any fixed `a`, `f` is linear in `a` with some constant k, so d = k*a.'
    minutes: 45
  - text: 'Build the accumulation bug on purpose: take a scalar parameter, run `backward()` twice without
      `zero_()`, and print `.grad` after each call. Write down the number you would have expected if gradients
      overwrote instead of accumulated. Keep this cell - you will hit this for real on Day 4.'
    minutes: 30
  - text: Call `backward()` twice on the same graph, read the RuntimeError about backward through the
      graph a second time, then fix it with `retain_graph=True` and write one line on what that costs
      you in memory.
    minutes: 25
  resources:
  - label: D2L 2.5 - Automatic Differentiation
    url: https://d2l.ai/chapter_preliminaries/autograd.html
    kind: textbook
  - label: PyTorch autograd mechanics
    url: https://pytorch.org/docs/stable/notes/autograd.html
    kind: docs
  - label: PyTorch docs (index)
    url: https://pytorch.org/docs/stable/index.html
    kind: docs
  deliverable: '`day02_autograd.ipynb` with the 2.5 cells, the control-flow check that passes, a cell
    that deliberately raises the freed-graph RuntimeError with your one-line explanation under it, and
    the accumulate-without-zeroing demo.'
  checkpoint: Why does PyTorch accumulate into `.grad` rather than overwriting it, and what does that
    design decision force you to write in every training loop you will ever author?
  prep_for_tomorrow:
  - Clone `github.com/karpathy/nn-zero-to-hero`. Tomorrow you work inside `lectures/micrograd/`.
  - Clone `github.com/karpathy/micrograd` as well, but do not open `engine.py`. You write that yourself
    on Day 4.
  - Open the micrograd lecture and confirm it plays. It runs 2h25m total and tomorrow you watch the first
    1h15m.
- day: 3
  date: '2026-07-26'
  weekday: Sunday
  week: 1
  phase: Foundations
  kind: study
  title: 'micrograd, first half: the Value object and the expression graph'
  hours: 3-4 h
  why: Karpathy builds a working autograd engine in about 100 lines of plain Python, and watching it assembled
    node by node is what turns `backward()` from a call into a mechanism you could rewrite yourself.
  objectives:
  - Explain why the numerical derivative gets worse rather than better once h drops below roughly 1e-8.
  - Given `c = a * b`, write the two lines that set `a.grad` and `b.grad` from `c.grad` without consulting
    the video.
  - Say what `_prev` and `_op` are stored for, and which nodes in an expression graph are leaves.
  tasks:
  - text: Watch the micrograd lecture from 0:00 to roughly 1:15, typing along in `lectures/micrograd/micrograd_lecture_first_half_roughly.ipynb`.
      Budget well over the 75 minutes of runtime - with pauses and typing this is closer to two hours,
      and that is the correct way to do it.
    minutes: 115
  - text: 'Reproduce the numerical-derivative section yourself: define f(x) = 3x^2 - 4x + 5, compute (f(x+h)
      - f(x)) / h at x = 3 for h in [1e-1, 1e-3, 1e-6, 1e-12], and plot the absolute error against the
      analytic value 6x - 4 = 14. Explain in one sentence why h = 1e-12 is worse than h = 1e-6.'
    minutes: 30
  - text: 'Do the tanh neuron by hand before the video shows you: x1 = 2.0, w1 = -3.0, x2 = 0.0, w2 =
      1.0, b = 6.8813735870195432, n = x1*w1 + x2*w2 + b, o = tanh(n). Fill in every `.grad` on paper,
      then check against the video. o comes out at 0.7071, so do/dn = 1 - o^2 = 0.5 exactly - that is
      the number every other gradient is scaled by.'
    minutes: 40
  - text: Draw the expression graph for a = 2.0, b = -3.0, c = 10.0, d = a*b + c on paper. Label every
      node with its `data`, its `_op`, and its `_prev` set, and mark which nodes are leaves. `d.data`
      should be 4.0.
    minutes: 20
  resources:
  - label: Karpathy L1 - micrograd, the spelled-out intro to backpropagation (2h25m)
    url: https://www.youtube.com/watch?v=VMj-3S1tku0
    kind: video
  - label: nn-zero-to-hero repo (lectures/micrograd/)
    url: https://github.com/karpathy/nn-zero-to-hero
    kind: repo
  - label: micrograd - the ~100-line autograd engine
    url: https://github.com/karpathy/micrograd
    kind: repo
  - label: 'Neural Networks: Zero to Hero course page'
    url: https://karpathy.ai/zero-to-hero.html
    kind: video
  deliverable: '`micrograd_lecture_first_half_roughly.ipynb` filled in by your own typing up to the 1:15
    mark, plus a hand-drawn expression graph for the tanh neuron with every local derivative labelled
    (a photo in the folder is fine).'
  checkpoint: For `c = a + b`, `a.grad` picks up `1.0 * c.grad`. For `c = a * b`, it picks up `b.data
    * c.grad`. Where does the multiplier come from in each case - in one sentence, without using the phrase
    'chain rule'?
  prep_for_tomorrow:
  - Queue the micrograd video at 1:15 and open `micrograd_lecture_second_half_roughly.ipynb`.
  - Create an empty file called `mygrad.py` in your working directory and leave it empty. Tomorrow you
    write micrograd into it from nothing.
  - Look at the file listing of `github.com/karpathy/micrograd` and note that `engine.py` is about 100
    lines. Still do not open it.
- day: 4
  date: '2026-07-27'
  weekday: Monday
  week: 1
  phase: Foundations
  kind: study
  title: Rebuild micrograd from an empty file
  hours: 3-4 h
  why: Watching an autograd engine get built and writing one from an empty file are different skills,
    and only the second one transfers.
  objectives:
  - Write `backward()` including the topological sort from memory, and say why the sort is required rather
    than calling each node's `_backward` in creation order.
  - Describe what `.grad` holds at step k when `zero_grad()` is missing, and what that does to the loss
    curve.
  - Explain why `_backward` is a closure over its parent nodes instead of a method taking arguments.
  tasks:
  - text: 'Watch the micrograd lecture from 1:15 to 2:25, typing into `micrograd_lecture_second_half_roughly.ipynb`.
      The three places to pause: the `_backward` closure attached to each `Value`, the topological sort
      inside `backward()`, and the `zero_grad` bug Karpathy walks into live.'
    minutes: 95
  - text: 'Close every tab and write `mygrad.py` from empty: `Value` with `__add__`, `__mul__`, `__pow__`,
      `tanh`, and `backward()` with a topological sort, then `Neuron`, `Layer`, `MLP`. No looking. When
      you get stuck, write down what you were stuck on before you look it up - that list is the real output
      of this exercise.'
    minutes: 70
  - text: 'Train `MLP(3, [4, 4, 1])` on Karpathy''s four-example toy set with ys = [1.0, -1.0, -1.0, 1.0]
      and MSE loss for 100 steps, and get the loss under 1e-3. Sanity check first: `len(n.parameters())`
      should be 41. Then delete the `zero_grad()` call, rerun, and write one sentence on what the loss
      curve does and why.'
    minutes: 35
  - text: 'Cross-check `mygrad.py` against PyTorch: build the same small expression in both, call `backward()`
      in both, and assert the gradients agree to 1e-9. If they don''t, the disagreement is in one operation
      - find which.'
    minutes: 25
  resources:
  - label: Karpathy L1 - micrograd (watch 1:15 to 2:25)
    url: https://www.youtube.com/watch?v=VMj-3S1tku0
    kind: video
  - label: nn-zero-to-hero repo (lectures/micrograd/)
    url: https://github.com/karpathy/nn-zero-to-hero
    kind: repo
  - label: micrograd - compare your mygrad.py against engine.py only after you finish
    url: https://github.com/karpathy/micrograd
    kind: repo
  deliverable: '`mygrad.py`, written from an empty file, that trains the toy dataset to final loss below
    1e-3 and passes a gradient-agreement assertion against PyTorch at 1e-9. Plus your written list of
    the places you got stuck.'
  checkpoint: Your `backward()` topologically sorts the graph and then walks it in reverse calling `_backward()`.
    Name the specific quantity that would be read before it is written if you walked the list forward
    instead.
  prep_for_tomorrow:
  - Write down, from memory tonight, the multinomial logistic regression log-likelihood the way you would
    write it in a stats paper. Tomorrow you match it to D2L's cross-entropy notation.
  - Confirm `torchvision.datasets.FashionMNIST` downloads in your environment - tomorrow's classifier
    needs a real 10-class dataset and you do not want to spend study time on the download.
  - Open D2L 4.1 Softmax Regression and read only its first paragraph.
- day: 5
  date: '2026-07-28'
  weekday: Tuesday
  week: 1
  phase: Foundations
  kind: study
  title: Softmax regression is multinomial logistic regression
  hours: 3-4 h
  why: You have fit this model before under a different name, so the work today is translating your likelihood
    notation into D2L's loss notation and then implementing it in a form that does not overflow.
  objectives:
  - Show that minimizing cross-entropy against one-hot labels is exactly maximizing the multinomial log-likelihood,
    in three lines of algebra.
  - Explain why `exp(o)` returns `inf` above roughly 88.7 in float32 and roughly 709.8 in float64, and
    prove that subtracting max(o) leaves softmax(o) unchanged.
  - Derive dL/do = yhat - y for softmax plus cross-entropy and verify it numerically against autograd.
  tasks:
  - text: Read D2L 4.1 Softmax Regression in full, including the Log-Likelihood subsection, the Softmax
      and Cross-Entropy Loss subsection, and the information theory section. Where D2L writes cross-entropy,
      write NLL in the margin - they are the same object and you should stop translating between them
      by the end of today.
    minutes: 50
  - text: 'Write `softmax(X)` twice: the naive version `exp(X) / exp(X).sum(1, keepdim=True)`, and the
      stable version that subtracts `X.max(1, keepdim=True).values` first. Feed both a float32 logit row
      containing 100.0 and record exactly what each returns.'
    minutes: 40
  - text: Implement cross-entropy directly from logits as `logsumexp(o) - o[y]`, never forming probabilities
      first, and check it agrees with `torch.nn.functional.cross_entropy` to 1e-6 on a random batch of
      shape (64, 10).
    minutes: 40
  - text: Train softmax regression on FashionMNIST from scratch - your softmax, your loss, manual SGD
      on W of shape (784, 10) and b of shape (10,) - for 10 epochs, and print test accuracy. Low-to-mid
      80s is the expected number. If you are sitting at 10% you have a sign error, not a learning-rate
      problem.
    minutes: 60
  - text: 'Derive dL/do = softmax(o) - onehot(y) on paper for a single example, then check it: build a
      random logit vector with `requires_grad=True`, compute your loss, call `backward()`, and compare
      `o.grad` against `softmax(o) - onehot(y)`.'
    minutes: 30
  resources:
  - label: D2L 4.1 - Softmax Regression
    url: https://d2l.ai/chapter_linear-classification/softmax-regression.html
    kind: textbook
  - label: D2L 4.1 - Softmax and Cross-Entropy Loss (subsection)
    url: https://d2l.ai/chapter_linear-classification/softmax-regression.html#softmax-and-cross-entropy-loss
    kind: textbook
  deliverable: '`day05_softmax.py` with your stable `softmax`, a logit-space cross-entropy matching `F.cross_entropy`
    to 1e-6, a trained FashionMNIST classifier with test accuracy printed, and the numerical confirmation
    that `o.grad` equals `softmax(o) - onehot(y)`.'
  checkpoint: Your naive softmax returns `nan` on a logit row containing 100.0, and subtracting the row
    max fixes it. Prove in one line that the subtraction changes nothing mathematically, and say which
    float type breaks first and at roughly what logit value.
  prep_for_tomorrow:
  - Open D2L 5.1, 5.3, and 5.4 in three tabs. Tomorrow is all three and it is the heaviest reading day
    of the week.
  - 'Sketch on one sheet the forward pass of a 2-layer MLP: X to Z1 = XW1 + b1 to H = relu(Z1) to O =
    HW2 + b2 to loss. Annotate every shape. You differentiate this tomorrow.'
  - Skim only the section headings of D2L 5.3 so tomorrow's densest read does not start cold.
- day: 6
  date: '2026-07-29'
  weekday: Wednesday
  week: 1
  phase: Foundations
  kind: study
  title: Backprop through a 2-layer MLP, by hand
  hours: 3-4 h
  why: D2L 5.3 turns the chain rule into a specific list of matrix expressions, and writing that backward
    pass yourself is what makes the vanishing-gradient argument in 5.4 a measurement instead of a warning.
  objectives:
  - Write dL/dW1 and dL/dW2 for a 2-layer MLP as matrix expressions with every shape checked, and match
    them against `torch.autograd.grad` to 1e-5.
  - State the maximum value of the sigmoid derivative and compute what it does to a gradient after 10
    stacked layers.
  - State what variance Xavier initialization targets and which two numbers it depends on.
  tasks:
  - text: Read D2L 5.1 Multilayer Perceptrons - the ReLU, sigmoid and tanh sections and the universal-approximation
      note. Move quickly; a hidden layer is a learned basis expansion and you already know what those
      buy you.
    minutes: 35
  - text: Read D2L 5.3 Forward Propagation, Backward Propagation, and Computational Graphs slowly, then
      redraw its computational graph on paper with your own shape annotations on every edge.
    minutes: 45
  - text: 'Read D2L 5.4 Numerical Stability and Initialization, then reproduce its vanishing-gradient
      point numerically: compute the sigmoid derivative over x in [-8, 8], read off the maximum (0.25,
      at x = 0), and raise it to the 10th power. That number, around 9.5e-7, is the whole argument.'
    minutes: 40
  - text: Implement a 2-layer MLP on FashionMNIST with a hand-written backward pass - no autograd, no
      `nn.Module`. Compute dL/dO = (softmax(O) - Y)/n, then dW2, db2, dH, dZ1 (masked by the ReLU), dW1,
      db1 yourself. Then rebuild the same forward pass a second time with `requires_grad=True` and assert
      every one of your gradients matches `torch.autograd.grad` to 1e-5 before you let it train.
    minutes: 75
  - text: Train a deeper net twice - 4 hidden layers with sigmoid activations, deeper than task 4 on purpose
      because the effect needs depth to show up - once with W ~ N(0, 1) and once with Xavier. Plot the
      mean absolute gradient of the first layer over the first 200 steps for both on one axis.
    minutes: 30
  resources:
  - label: D2L 5.1 - Multilayer Perceptrons
    url: https://d2l.ai/chapter_multilayer-perceptrons/mlp.html
    kind: textbook
  - label: D2L 5.3 - Forward Propagation, Backward Propagation, and Computational Graphs
    url: https://d2l.ai/chapter_multilayer-perceptrons/backprop.html
    kind: textbook
  - label: D2L 5.4 - Numerical Stability and Initialization
    url: https://d2l.ai/chapter_multilayer-perceptrons/numerical-stability-and-init.html
    kind: textbook
  deliverable: '`day06_mlp_manual_backward.py` - a 2-layer MLP whose backward pass you wrote, with an
    assertion that every gradient matches `torch.autograd.grad` to 1e-5, plus one figure comparing first-layer
    gradient magnitude under N(0, 1) versus Xavier initialization.'
  checkpoint: In your backward pass, `dZ1 = dH * (Z1 > 0)`. Why is that elementwise mask there, and what
    term replaces it if you swap ReLU for sigmoid?
  prep_for_tomorrow:
  - Put a blank sheet of paper somewhere visible and close your Day 6 code. Tomorrow you re-derive that
    backward pass from memory before you are allowed to reopen it.
  - Write the list of things from Days 1 to 6 you left half-finished or half-understood. Tomorrow's first
    task is closing that list.
  - Check that `mygrad.py` from Day 4 still runs, so tomorrow's clean-interpreter check is not a surprise.
- day: 7
  date: '2026-07-30'
  weekday: Thursday
  week: 1
  phase: Foundations
  kind: catchup
  title: Re-derive backprop from memory
  hours: 2-3 h
  why: 'Nothing new today: if Days 1 through 6 are done and every gradient check passes, this day is yours
    to spend or skip, and if they aren''t, this is the buffer that keeps Week 2 from starting on a broken
    foundation.'
  objectives:
  - Reproduce the full backward pass of a 2-layer MLP on paper, from the loss down to dW1, with all code
    closed.
  - Name in writing the two gradient bugs you actually hit this week and describe what each looked like
    from the outside, before you knew the cause.
  tasks:
  - text: Close out the list you wrote last night. Gradient checks that do not pass count as outstanding,
