- day: 48
  date: '2026-09-09'
  weekday: Wednesday
  week: 7
  phase: Pipeline, RAG, evaluation
  kind: study
  title: HELM, MedHELM, and the distinctions a single score erases
  hours: 3-4 h
  why: 'For clinical work the evaluation is the deliverable, and HELM''s contribution was structural rather
    than numerical: it insists that every model be scored on every scenario across several metrics at
    once, which makes visible the trade-offs a leaderboard column hides.'
  objectives:
  - You can name the metric categories HELM measures for every scenario and say which of them your Day
    35 report already covers.
  - You can point at two MedHELM scenarios and say precisely what a high score there does and does not
    predict about a clinician's actual workflow.
  - You can classify a given failure as a model failure, a retrieval failure, an interface failure or
    a workflow failure, and name the evidence that settles it.
  tasks:
  - text: 'Read the HELM paper (arXiv 2211.09110) Sections 1-3: the scenario-by-metric taxonomy, the argument
      for dense coverage over cherry-picked benchmarks, and the seven metric categories measured for each
      scenario - accuracy, calibration, robustness, fairness, bias, toxicity, efficiency. Write down which
      of the seven you have ever measured on your own task.'
    minutes: 55
  - text: Open HELM Capabilities and HELM Lite. Pick one model and read across its metrics instead of
      down the ranking, then find a pair of models whose order flips depending on which metric you sort
      by. Record the pair and the two metrics.
    minutes: 35
  - text: Work through MedHELM. Count how many of its scenarios are built from real clinical records or
      clinician-authored workflows versus how many are exam-style multiple choice, then pick the two scenarios
      closest to your PubMed abstract task and write down what each actually asks the model to do.
    minutes: 50
  - text: 'Write eval_principles.md: six distinctions - capability vs reliability, average vs worst case,
      knowledge vs reasoning, correctness vs persuasiveness, benchmark score vs real-world utility, and
      model failure vs retrieval/interface/workflow failure. For each, one line on which side your current
      evaluation measures, and one line on what you would have to build to measure the other.'
    minutes: 45
  - text: 'Record what maintenance mode since 2026-06-01 means for using HELM going forward: which parts
      stay useful indefinitely (the taxonomy, the scenario definitions, the released code) and which decay
      (leaderboard coverage of anything released after that date).'
    minutes: 20
  resources:
