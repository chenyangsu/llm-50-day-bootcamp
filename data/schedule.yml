    minutes: 45
  - text: On paper, with everything closed, re-derive the backward pass for X to Z1 = XW1 + b1 to H =
      relu(Z1) to O = HW2 + b2 to softmax cross-entropy. Write each expression with its shape beside it.
      Then open `day06_mlp_manual_backward.py` and diff your paper against it line by line.
    minutes: 50
  - text: 'Write `week1_summary.md`, one page, answering in your own words: what a computational graph
      is and what gets stored in it; what a `_backward` closure captures; why cross-entropy computed from
      logits is numerically different from cross-entropy computed from probabilities; and what initialization
      is actually controlling.'
    minutes: 40
  - text: Re-run `mygrad.py` and `day06_mlp_manual_backward.py` from a fresh interpreter, top to bottom,
      and confirm both still produce the numbers you recorded. Fix anything that only worked because of
