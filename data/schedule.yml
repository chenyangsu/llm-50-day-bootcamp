    minutes: 25
  resources:
  - label: SLP3 Ch3 - N-gram Language Models (Week 2 starts here)
    url: https://web.stanford.edu/~jurafsky/slp3/3.pdf
    kind: textbook
  - label: makemore - single makemore.py plus names.txt
    url: https://github.com/karpathy/makemore
    kind: repo
  - label: SLP3 landing page
    url: https://web.stanford.edu/~jurafsky/slp3/
    kind: textbook
  deliverable: '`week1_summary.md` at one page, your paper re-derivation photographed into the same folder,
    and both `mygrad.py` and `day06_mlp_manual_backward.py` running clean from a fresh interpreter.'
  checkpoint: Explain backpropagation in under two minutes to someone who knows the chain rule and matrix
    calculus but has never seen a neural network. If you cannot say what the graph is and why the traversal
    runs in reverse, go back to Day 4.
  prep_for_tomorrow:
  - Download the SLP3 Chapter 3 PDF on n-gram language models. Tomorrow starts there and you do not want
    to spend study time fetching it.
  - Clone `github.com/karpathy/makemore` and confirm `names.txt` is present. `wc -l names.txt` should
    print 32033.
  - 'Run `head -20 names.txt`: lowercase, one name per line, no header. That single file is Week 2''s
    entire dataset.'
  - Write down your guess, before you read anything, for how many distinct character bigrams exist in
    a 27-symbol alphabet including the start/end token.
- day: 8
  date: '2026-07-31'
  weekday: Friday
  week: 2
  phase: Language models
  kind: study
  title: A language model you can count by hand
  hours: 3-4 h
  why: A language model is a conditional probability table before it is anything else, and estimating
    one by counting gives you a baseline that every neural model this month has to beat.
  objectives:
  - Write the chain rule of probability for a 5-token sentence, then write what the bigram Markov assumption
    replaces it with, and name what is thrown away.
  - Derive the bigram MLE as count(w_prev, w) / count(w_prev) from the multinomial log-likelihood rather
    than quoting it as a definition.
  - Sample 10 names from your own bigram model and explain why they are name-shaped but not names.
  tasks:
  - text: Read SLP3 Ch3 sections 3.1-3.4. Before you reach the MLE equation, stop and maximize the multinomial
      log-likelihood yourself on paper - it is the same estimator you use for allele frequencies, with
      the same Lagrange-multiplier normalization step.
    minutes: 65
  - text: Clone github.com/karpathy/makemore, confirm names.txt loads and count the entries (32,033),
      then build a 27x27 integer tensor N of character bigram counts using '.' as index 0 for both start
      and end of a name.
    minutes: 55
