  hours: 3-4 h
  why: InstructGPT needed a reward model and a PPO loop; DPO shows both were an artifact of how the problem
    was written down, and the algebra that removes them is short enough to do on one sheet of paper.
  objectives:
  - You can write the DPO loss from memory and say exactly where the partition function Z(x) goes and
    why it cancels.
  - You can state what the frozen reference policy is doing in the loss, and predict what generations
    look like as beta goes to zero.
  - You can read TRL's rewards/margins and rewards/accuracies curves and say whether a run learned the
    preference or just drifted away from the reference.
  tasks:
  - text: Read the DPO paper (arXiv 2305.18290) Sections 1-3, stopping at the end of the preliminaries.
      You already know the RLHF pipeline from InstructGPT in Week 6 - read Section 3 as a restatement
      of it in notation you will need next.
    minutes: 45
  - text: Work Section 4 on paper without reading it first. Start from the KL-constrained reward objective,
      get the closed-form optimal policy, invert it to write the reward as beta*log(pi/pi_ref) + beta*log
      Z(x), substitute into Bradley-Terry, and watch Z(x) disappear from the difference. This is the same
      move as a stratum intercept dropping out of a conditional logistic likelihood for matched pairs
      - and what is left is a binary logistic regression on the difference of two log-ratios.
    minutes: 45
  - text: Run a DPOTrainer job in TRL on 200-400 preference pairs, using a model small enough to hold
      twice in memory since the frozen reference is a second copy. Log rewards/chosen, rewards/rejected,
      rewards/margins and rewards/accuracies, and plot all four against step.
    minutes: 75
  - text: Rerun with beta at 0.01 and at 0.5, sample 10 generations from each checkpoint, and write down
      what actually changed in the text - not just what the loss curve did.
    minutes: 35
